name: Update Catalog JSON Automatically

on:
  repository_dispatch:
    types: [update-catalog]

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create or Update catalog.json
        run: |
          echo '${{ github.event.client_payload.catalog }}' > catalog.json

      - name: Commit and Push catalog.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git commit -m "Auto-update catalog.json via Google Apps Script"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
